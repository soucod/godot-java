name: Release to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_USERNAME}</username>
                <password>${env.CENTRAL_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Resolve release version
        run: echo "REVISION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Prepare Central publish POMs
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          revision = os.environ["REVISION"]
          root = Path("pom.xml")
          root_text = root.read_text()
          root_text = root_text.replace("<version>${revision}</version>", f"<version>{revision}</version>", 1)
          root_text = re.sub(r"<revision>[^<]+</revision>", f"<revision>{revision}</revision>", root_text, count=1)
          root.write_text(root_text)

          parent_with_coordinates = f"""    <parent>\n        <groupId>io.github.youngledo</groupId>\n        <artifactId>godot-java</artifactId>\n        <version>{revision}</version>\n    </parent>"""
          for path in [
              Path("godot-java-code-generator/pom.xml"),
              Path("godot-java-core/pom.xml"),
              Path("godot-java-examples/pom.xml"),
          ]:
              text = path.read_text()
              if "    <parent/>" not in text:
                  raise RuntimeError(f"Unexpected parent block in {path}")
              path.write_text(text.replace("    <parent/>", parent_with_coordinates, 1))
          PY

      - name: Build and publish
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
        run: ./mvnw deploy central-publishing:publish -P release -Drevision="$REVISION" -DskipTests -B
