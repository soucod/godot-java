name: Release to Maven Central

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: macos-latest
            classifier: macos-universal
            native_profile: native-macos-universal
            native_build: ./godot-java-core/native/build-macos.sh
          - os: ubuntu-latest
            classifier: linux-x86_64
            native_profile: native-linux-x86_64
            native_build: ./godot-java-core/native/build-linux.sh
          - os: windows-latest
            classifier: windows-x86_64
            native_profile: native-windows-x86_64
            native_build: ./godot-java-core/native/build-windows.bat

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Resolve release version
        shell: bash
        run: echo "REVISION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang build-essential

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build native library (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "${{ matrix.native_build }}"
          "${{ matrix.native_build }}"

      - name: Build native library (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: call "${{ matrix.native_build }}"

      - name: Package native artifact (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: ./mvnw package -pl godot-java-native -Drevision="$REVISION" -Ppackage-native,${{ matrix.native_profile }} -Dspotless.skip=true -B

      - name: Package native artifact (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: .\mvnw.cmd package -pl godot-java-native -Drevision=%REVISION% -Ppackage-native,${{ matrix.native_profile }} -Dspotless.skip=true -B

      - name: Stage native artifact
        shell: bash
        run: |
          mkdir -p native-artifact
          cp godot-java-native/target/godot-java-native-"$REVISION"-${{ matrix.classifier }}.zip native-artifact/

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-java-native-${{ matrix.classifier }}
          path: native-artifact/*.zip

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang build-essential

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_USERNAME}</username>
                <password>${env.CENTRAL_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Resolve release version
        run: echo "REVISION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: godot-java-native-*
          path: dist/native
          merge-multiple: true

      - name: Prepare Central publish POMs
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          revision = os.environ["REVISION"]
          root = Path("pom.xml")
          root_text = root.read_text()

          def property_value(name):
              match = re.search(rf"<{re.escape(name)}>\s*([^<]+)\s*</{re.escape(name)}>", root_text)
              if not match:
                  raise RuntimeError(f"Missing root POM property: {name}")
              return match.group(1)

          def central_compatible_pom(text):
              text = text.replace("http://maven.apache.org/POM/4.1.0", "http://maven.apache.org/POM/4.0.0")
              text = text.replace("https://maven.apache.org/xsd/maven-4.1.0.xsd", "https://maven.apache.org/xsd/maven-4.0.0.xsd")
              text = text.replace("<modelVersion>4.1.0</modelVersion>", "<modelVersion>4.0.0</modelVersion>")
              if "<modelVersion>" not in text:
                  text = re.sub(r"(<project\b[^>]*>\s*)", r"\1    <modelVersion>4.0.0</modelVersion>\n", text, count=1, flags=re.S)
              return text

          junit_version = property_value("junit.version")
          log4j2_version = property_value("log4j2.version")

          root_text = central_compatible_pom(root_text)
          root_text = root_text.replace("<version>${revision}</version>", f"<version>{revision}</version>", 1)
          root_text = re.sub(r"<revision>[^<]+</revision>", f"<revision>{revision}</revision>", root_text, count=1)
          root.write_text(root_text)

          parent_with_coordinates = f"""    <parent>\n        <groupId>io.github.youngledo</groupId>\n        <artifactId>godot-java</artifactId>\n        <version>{revision}</version>\n    </parent>"""
          for path in [
              Path("godot-java-code-generator/pom.xml"),
              Path("godot-java-core/pom.xml"),
              Path("godot-java-examples/pom.xml"),
              Path("godot-java-native/pom.xml"),
          ]:
              text = central_compatible_pom(path.read_text())
              if "<parent/>" not in text:
                  raise RuntimeError(f"Unexpected parent block in {path}")
              path.write_text(re.sub(r"\s*<parent/>\s*", "\n" + parent_with_coordinates + "\n\n", text, count=1))

          core = Path("godot-java-core/pom.xml")
          core_text = core.read_text()
          core_coordinates = f"""    <groupId>io.github.youngledo</groupId>\n    <version>{revision}</version>\n"""
          core_text = core_text.replace("    <artifactId>godot-java-core</artifactId>", core_coordinates + "    <artifactId>godot-java-core</artifactId>", 1)
          core_metadata = """

              <url>https://github.com/youngledo/godot-java</url>

              <licenses>
                  <license>
                      <name>Apache-2.0</name>
                      <url>https://www.apache.org/licenses/LICENSE-2.0</url>
                      <distribution>repo</distribution>
                  </license>
              </licenses>

              <developers>
                  <developer>
                      <id>youngledo</id>
                  </developer>
              </developers>

              <scm>
                  <connection>scm:git:git@github.com:youngledo/godot-java.git</connection>
                  <developerConnection>scm:git:git@github.com:youngledo/godot-java.git</developerConnection>
                  <url>https://github.com/youngledo/godot-java</url>
              </scm>"""
          core_text = core_text.replace("    <description>Java binding for Godot 4.x via GDExtension and Panama FFI</description>", "    <description>Java binding for Godot 4.x via GDExtension and Panama FFI</description>" + core_metadata, 1)
          core_text = core_text.replace("""            <artifactId>godot-java-code-generator</artifactId>\n            <optional>true</optional>""", f"""            <artifactId>godot-java-code-generator</artifactId>\n            <version>{revision}</version>\n            <optional>true</optional>""", 1)
          core_text = core_text.replace("""            <artifactId>junit-jupiter</artifactId>""", f"""            <artifactId>junit-jupiter</artifactId>\n            <version>{junit_version}</version>\n            <scope>test</scope>""", 1)
          core_text = core_text.replace("""            <artifactId>log4j-api</artifactId>""", f"""            <artifactId>log4j-api</artifactId>\n            <version>{log4j2_version}</version>""", 1)
          core_text = core_text.replace("""            <artifactId>log4j-core</artifactId>""", f"""            <artifactId>log4j-core</artifactId>\n            <version>{log4j2_version}</version>\n            <scope>runtime</scope>""", 1)
          core.write_text(core_text)

          examples = Path("godot-java-examples/pom.xml")
          examples_text = examples.read_text()
          examples_text = examples_text.replace("""            <artifactId>godot-java-core</artifactId>\n            <version>${revision}</version>""", f"""            <artifactId>godot-java-core</artifactId>\n            <version>{revision}</version>""", 1)
          examples.write_text(examples_text)
          PY

      - name: Build and publish
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
        run: ./mvnw deploy central-publishing:publish -P release -Drevision="$REVISION" -Dgodot.java.native.attach.dir="$PWD/dist/native" -DskipTests -B

      - name: Attach native fallback artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/native/*.zip

  bump-next-development-version:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve next snapshot version
        shell: bash
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$RELEASE_VERSION"
          if [[ -z "$MAJOR" || -z "$MINOR" || -z "$PATCH" || "$PATCH" == *-* ]]; then
            echo "Unsupported release version for automatic bump: $RELEASE_VERSION" >&2
            exit 1
          fi
          NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))-SNAPSHOT"
          echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_ENV"

      - name: Bump revision property
        shell: bash
        run: |
          ruby -0pi -e 'version = ENV.fetch("NEXT_VERSION"); sub(%r{<revision>[^<]+</revision>}, "<revision>#{version}</revision>")' pom.xml
          git diff -- pom.xml

      - name: Commit next development version
        shell: bash
        run: |
          if git diff --quiet -- pom.xml; then
            echo "pom.xml already uses $NEXT_VERSION"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "Bump revision to $NEXT_VERSION"
          git push origin HEAD:main
